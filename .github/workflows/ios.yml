name: iOS CI

on:
  push:
    branches: [main]
    paths: ['ios/**']
  pull_request:
    paths: ['ios/**']

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.1
        run: sudo xcode-select -s /Applications/Xcode_26.1.app

      - name: Test
        run: |
          xcodebuild test \
            -project ios/FamilyHub/FamilyHub.xcodeproj \
            -scheme FamilyHub \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath ios-test-results \
            CODE_SIGNING_ALLOWED=NO
